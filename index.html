<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Supervisor QA - SiperQA</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✅</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .active-tab { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: bold; background-color: #eff6ff; }
        .header-blue { background-color: #3b82f6; color: white; font-weight: bold; }
        #loginOverlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .critical-row { background-color: #fff1f2; }
        .btn-press:active { transform: scale(0.96); transition: 0.1s; }
        
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        th.sortable { cursor: pointer; position: relative; }
        th.sortable:hover { background-color: #f1f5f9; }

        .criterio-box { font-size: 10px; line-height: 1.3; margin-top: 4px; padding: 6px; border-radius: 6px; }
        .criterio-cumple { background-color: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .criterio-nocumple { background-color: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
    </style>
</head>
<body class="bg-slate-50 font-sans h-screen flex flex-col overflow-hidden">

    <div id="loginOverlay">
        <div class="text-white text-xl font-bold flex flex-col items-center">
            <div class="loader mb-4"></div>
            Cargando entorno de auditoría...
        </div>
    </div>

    <nav class="bg-white border-b border-gray-200 px-6 py-3 flex justify-between items-center shadow-sm z-40">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 text-white w-8 h-8 rounded flex items-center justify-center font-bold">S</div>
            <div>
                <span class="font-bold text-gray-700 block leading-tight">Consola Supervisor</span>
                <span id="labelSupervisor" class="text-[10px] text-blue-600 font-bold uppercase tracking-wider">Sin identificar</span>
            </div>
        </div>
        <div class="flex gap-2 text-sm bg-gray-100 p-1 rounded-lg">
            <button onclick="cambiarTab('tabIngreso')" id="btnTabIngreso" class="tab-btn active-tab px-4 py-2 rounded-md transition btn-press">📝 Auditar</button>
            <button onclick="cambiarTab('tabDashboard')" id="btnTabDashboard" class="tab-btn px-4 py-2 rounded-md transition text-gray-500 hover:text-gray-800 btn-press">📊 Mi Equipo</button>
        </div>
    </nav>

    <div id="tabIngreso" class="tab-content p-4 overflow-y-auto flex-1">
        <div class="max-w-6xl mx-auto bg-white p-6 rounded-xl shadow border border-gray-200">
            <form id="auditForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 bg-slate-50 p-4 rounded-lg border border-gray-200">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Ejecutivo</label>
                        <select id="selectEjecutivo" name="nombre" class="w-full border rounded p-2 font-bold text-sm bg-white" required onchange="autocompletarDatos()">
                            <option value="">-- Seleccionar --</option>
                        </select>
                        <div id="comentarioEjecutivo" class="text-[11px] text-blue-600 italic mt-1 hidden font-semibold"></div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Código</label>
                        <input type="text" id="inputCodigo" name="codigo" class="w-full bg-gray-100 border rounded p-2 text-sm font-mono" readonly>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Supervisor</label>
                        <input type="text" id="inputSup" name="supervisor" class="w-full bg-gray-100 border rounded p-2 text-sm" readonly>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Servicio</label>
                        <input type="text" id="inputServ" name="servicio" class="w-full bg-gray-100 border rounded p-2 text-sm" readonly>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Fecha Llamada</label>
                        <input type="date" id="fechaLlamada" name="fecha_llamada" class="w-full border rounded p-2 text-sm" required onchange="calcularSemana()">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Hora Llamada</label>
                        <input type="time" name="hora_llamada" class="w-full border rounded p-2 text-sm" required>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-blue-600 uppercase">RUT Paciente</label>
                        <input type="text" name="rut_paciente" class="w-full border-2 border-blue-100 rounded p-2 text-sm" required placeholder="12.345.678-9">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">URL Audio (Opcional)</label>
                        <div class="flex gap-2">
                            <input type="url" id="inputAudioUrl" name="audio_url" class="w-full border rounded p-2 text-sm" placeholder="https://...">
                            <button type="button" onclick="cargarAudioFlotante()" class="bg-slate-800 text-white px-3 rounded hover:bg-slate-700 btn-press tooltip" title="Abrir Player">🎧</button>
                        </div>
                    </div>
                </div>

                <input type="hidden" id="inputSemana" name="semana">
                <input type="hidden" id="fechaAuditoria" name="fecha_auditoria">
                <input type="hidden" id="inputAuditorReal" name="auditor_real">
                <input type="hidden" id="notaFinalHidden" name="nota_final" value="0%">

                <div class="overflow-x-auto rounded border border-gray-300">
                    <table class="w-full text-[11px]">
                        <thead>
                            <tr class="header-blue text-center uppercase">
                                <th class="p-2 w-24">Categoría</th>
                                <th class="p-2 text-left">Indicador / Criterios</th>
                                <th class="p-2 w-16">Tipo</th>
                                <th class="p-2 w-24">Cumple</th>
                                <th class="p-2 w-48 bg-slate-700 text-white">Observación de Quiebre</th>
                            </tr>
                        </thead>
                        <tbody id="pautaBody" class="divide-y divide-gray-200"></tbody>
                        <tfoot>
                            <tr class="bg-gray-800 text-white">
                                <td colspan="4" class="p-3 text-right font-bold text-sm uppercase">Nota Final:</td>
                                <td class="p-3 text-center font-black text-2xl" id="totalScore">100%</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Comentario General y Feedback</label>
                    <textarea id="comentarioFinal" name="comentario" class="w-full border p-3 rounded h-32 text-sm bg-white" placeholder="Escribe aquí tu análisis general de la llamada..."></textarea>
                </div>
                
                <button type="submit" id="btnGuardar" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 btn-press">
                    <i class="fas fa-save mr-2"></i> GUARDAR AUDITORÍA
                </button>
            </form>
        </div>
    </div>

    <div id="tabDashboard" class="tab-content hidden p-4 overflow-y-auto flex-1 bg-slate-100">
        <div class="max-w-6xl mx-auto space-y-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 grid grid-cols-1 md:grid-cols-5 gap-3 items-end">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Mes / Ciclo</label>
                    <select id="filtroCiclo" class="w-full border rounded p-2 text-sm bg-gray-50" onchange="cargarDashboardEquipo()">
                        <option value="">Cargando Ciclos...</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Ejecutivo</label>
                    <input type="text" id="filtroEjecutivo" list="listaEjecutivosFiltro" class="w-full border rounded p-2 text-sm bg-gray-50" placeholder="Buscar nombre...">
                    <datalist id="listaEjecutivosFiltro"></datalist>
                </div>
                <div class="flex gap-2">
                    <button onclick="actualizarDatosServidor()" class="flex-1 bg-blue-600 text-white p-2 rounded-lg btn-press text-xs font-bold flex items-center justify-center gap-2">
                        <span id="loadSpinner" class="hidden"><div class="loader" style="width:12px; height:12px; border-width:2px;"></div></span>
                        <i class="fas fa-sync-alt"></i> ACTUALIZAR DATOS
                    </button>
                    <button onclick="borrarFiltros()" class="flex-1 bg-gray-500 text-white p-2 rounded-lg btn-press text-xs font-bold">
                        <i class="fas fa-eraser"></i> BORRAR
                    </button>
                </div>
            </div>

            <div id="containerTarjetas" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500 text-center">
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Promedio Equipo</p>
                    <p class="text-3xl font-black text-slate-700" id="dashProm">0%</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-purple-500 text-center">
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Ciclos Feedback</p>
                    <p class="text-3xl font-black text-slate-700" id="kpiFeedbackCount">0/0</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-red-500 text-center">
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Casos PEC</p>
                    <p class="text-3xl font-black text-red-600" id="dashPec">0</p>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <table class="w-full text-xs" id="tableMain">
                    <thead class="bg-slate-100 text-gray-500 uppercase">
                        <tr>
                            <th class="p-3 text-left sortable" onclick="sortTable(0)">Ejecutivo <i class="fas fa-sort"></i></th>
                            <th class="p-3 text-center sortable" onclick="sortTable(1)">Fecha <i class="fas fa-sort"></i></th>
                            <th class="p-3 text-center sortable" onclick="sortTable(2)">Nota <i class="fas fa-sort"></i></th>
                            <th class="p-3 text-center sortable" onclick="sortTable(3)">Feedback <i class="fas fa-sort"></i></th>
                            <th class="p-3 text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tablaEquipo" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="pipPlayer" class="hidden fixed bottom-4 right-4 w-80 bg-slate-900 rounded-xl shadow-2xl border border-slate-700 p-4 z-50 text-white">
        <div class="flex justify-between items-center mb-2 drag-handle cursor-move">
            <span class="text-xs font-bold text-slate-300"><i class="fas fa-grip-horizontal mr-1"></i> Player SiperQA</span>
            <button type="button" onclick="cerrarAudioFlotante()" class="text-slate-400 hover:text-white">&times;</button>
        </div>
        <audio id="audioFlotante" class="hidden"></audio>
        <div class="flex items-center gap-2 mb-2">
            <button type="button" onclick="togglePlay()" id="btnPlay" class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center hover:bg-blue-500 transition"><i class="fas fa-play text-xs"></i></button>
            <button type="button" onclick="stopAudio()" class="w-8 h-8 bg-red-600 rounded-full flex items-center justify-center hover:bg-red-500 transition"><i class="fas fa-stop text-xs"></i></button>
            <select id="audioSpeed" onchange="changeSpeed(this.value)" class="text-xs bg-slate-800 border border-slate-600 rounded p-1 ml-auto text-white outline-none cursor-pointer">
                <option value="1">1.0x</option><option value="1.5">1.5x</option><option value="2">2.0x</option>
            </select>
        </div>
        <div class="flex items-center gap-2 text-[10px] text-slate-400">
            <span id="timeCurrent" class="w-8">0:00</span>
            <input type="range" id="seekSlider" value="0" step="1" class="w-full accent-blue-500 cursor-pointer">
            <span id="timeTotal" class="w-8">0:00</span>
        </div>
    </div>

    <script>
        // ¡REEMPLAZA AQUÍ TU URL DE GOOGLE APPS SCRIPT!
        const API_URL = "https://script.google.com/macros/s/AKfycbzEnzOn8TVN8xAX7do3tk1N2g3bD0lKh9EF5eh6T_I2yHFiPdeKDrM4RTwjG8f2uIzDJQ/exec";
        
        let CURRENT_USER = "";
        let FULL_DATA = [];
        let baseEjecutivos = [];
        let pautaItems = [];
        const mesesNombres = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

        const ID_MAPEO_ORIGINAL = ["item_validacion", "item_confidencialidad", "item_normas", "item_abandono", "item_registro", "item_script", "item_cortesia", "item_sondeo", "item_info", "item_tiempos", "item_aseguramiento", "item_personalizacion", "item_lenguaje", "item_empatia", "item_tipificacion"];

        window.onload = async () => {
            const overlay = document.getElementById('loginOverlay');
            const htmlOriginal = `
                <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center border-t-4 border-blue-500">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">Acceso Supervisor</h2>
                    <select id="loginSelect" class="w-full p-3 border-2 border-gray-200 rounded-xl mb-6 font-bold text-gray-700 outline-none focus:border-blue-500 bg-gray-50">
                        <option value="">-- Selecciona tu Nombre --</option>
                    </select>
                    <button onclick="iniciarSesion()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition shadow-lg btn-press">INGRESAR</button>
                </div>`;
            
            try {
                const r = await fetch(API_URL);
                const data = await r.json();
                
                FULL_DATA = data.auditorias || [];
                baseEjecutivos = data.ejecutivos || [];
                
                pautaItems = (data.pauta || []).map((p, index) => ({
                    cat: p.Categoría,
                    id: p.ID || ID_MAPEO_ORIGINAL[index] || "item_dinamico_" + index,
                    label: p.Indicador,
                    type: String(p.Peso).toUpperCase() === "PEC" ? "PEC" : "PENC",
                    weight: String(p.Peso).toUpperCase() !== "PEC" ? parseInt(p.Peso) : 0,
                    ok: p.Criterio_SI,
                    fail: p.Criterio_NO
                }));

                overlay.innerHTML = htmlOriginal;
                const supervisores = [...new Set(baseEjecutivos.map(e => e.Supervisor))].sort();
                const select = document.getElementById('loginSelect');
                supervisores.forEach(s => {
                    if(s) { let opt = document.createElement('option'); opt.value = s; opt.innerText = s; select.appendChild(opt); }
                });
                renderPauta();
            } catch (e) {
                console.error(e);
                Swal.fire("Error Fatal", "No se pudo conectar a la base de datos.", "error");
            }
        };

        function iniciarSesion() {
            const user = document.getElementById('loginSelect').value;
            if(!user) return Swal.fire("Atención", "Selecciona tu nombre", "warning");
            CURRENT_USER = user;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('labelSupervisor').innerText = user;
            
            const selectEjec = document.getElementById('selectEjecutivo');
            selectEjec.innerHTML = '<option value="">-- Seleccionar --</option>';
            
            // Todos los ejecutivos disponibles (Evaluación cruzada)
            baseEjecutivos.forEach(e => {
                let opt = document.createElement('option'); opt.value = e.Nombre; opt.innerText = e.Nombre;
                selectEjec.appendChild(opt);
            });
        }

        function autocompletarDatos() {
            const nombre = document.getElementById('selectEjecutivo').value;
            const data = baseEjecutivos.find(e => e.Nombre === nombre);
            const divComentario = document.getElementById('comentarioEjecutivo');
            
            if(data) {
                document.getElementById('inputCodigo').value = data.Código;
                document.getElementById('inputServ').value = data.Servicio;
                document.getElementById('inputSup').value = data.Supervisor; // Se mantiene el oficial
                document.getElementById('inputAuditorReal').value = CURRENT_USER; // Auditor cruzado real
                
                if(data.Comentario_Interno) {
                    divComentario.innerText = "📌 " + data.Comentario_Interno;
                    divComentario.classList.remove('hidden');
                } else {
                    divComentario.classList.add('hidden');
                }
                calculateScore(); 
            } else {
                divComentario.classList.add('hidden');
            }
        }

        function renderPauta() {
            const body = document.getElementById('pautaBody');
            body.innerHTML = "";
            pautaItems.forEach(item => {
                const tr = document.createElement('tr');
                if(item.type === "PEC") tr.className = "critical-row";
                const criteriosHtml = `
                    <div class="mt-2 grid grid-cols-1 md:grid-cols-2 gap-2">
                        <div class="criterio-box criterio-cumple"><i class="fas fa-check-circle mr-1"></i> <b>CUMPLE:</b> ${item.ok}</div>
                        <div class="criterio-box criterio-nocumple"><i class="fas fa-times-circle mr-1"></i> <b>NO CUMPLE:</b> ${item.fail}</div>
                    </div>`;
                tr.innerHTML = `
                    <td class="p-2 font-bold align-top ${item.type === 'PEC' ? 'text-red-700' : 'text-slate-500'}">${item.cat}</td>
                    <td class="p-2 align-top"><span class="font-bold text-sm block">${item.label}</span>${criteriosHtml}</td>
                    <td class="p-2 text-center align-top font-bold ${item.type === 'PEC' ? 'text-red-500' : 'text-blue-500'}">${item.type === 'PEC' ? 'PEC' : item.weight+'%'}</td>
                    <td class="p-1 align-top"><select name="${item.id}" class="w-full border rounded p-1 calc-trigger" data-id="${item.id}" data-type="${item.type}" data-weight="${item.weight || 0}" onchange="toggleObs(this)"><option value="SI">SI</option><option value="NO">NO</option></select></td>
                    <td class="p-1 align-top"><input type="text" id="obs_${item.id}" class="obs-input w-full border border-blue-200 rounded p-1 hidden text-[10px]" placeholder="¿Por qué no cumple?"></td>
                `;
                body.appendChild(tr);
            });
            calculateScore();
        }

        function toggleObs(select) {
            const input = document.getElementById('obs_' + select.dataset.id);
            if(select.value === 'NO') input.classList.remove('hidden');
            else { input.classList.add('hidden'); input.value = ""; }
            calculateScore();
        }

        function calculateScore() {
            let total = 0, isPec = false;
            document.querySelectorAll('.calc-trigger').forEach(sel => {
                if(sel.dataset.type === "PEC" && sel.value === "NO") isPec = true;
                if(sel.dataset.type === "PENC" && sel.value === "SI") total += parseInt(sel.dataset.weight);
            });
            const nota = isPec ? 0 : total;
            document.getElementById('totalScore').innerText = nota + "%";
            document.getElementById('notaFinalHidden').value = nota + "%";
        }

        function calcularSemana() {
            const f = document.getElementById('fechaLlamada').value;
            if(!f) return;
            const d = new Date(f).getUTCDate();
            const s = Math.ceil(d/7);
            document.getElementById('inputSemana').value = "Semana " + (s > 4 ? 4 : s);
        }

        function cambiarTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(id).classList.remove('hidden');
            const btnId = id === 'tabIngreso' ? 'btnTabIngreso' : 'btnTabDashboard';
            document.getElementById(btnId).classList.add('active-tab');
            if(id === 'tabDashboard') cargarDashboardEquipo();
        }

        // --- LÓGICA DE ENVÍO Y ALERTA DE CARGA ---
        document.getElementById('auditForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if(!this.checkValidity()) {
                this.reportValidity();
                return;
            }

            let textoFeedback = document.getElementById('comentarioFinal').value;
            let quiebres = [];
            pautaItems.forEach(item => {
                const sel = document.querySelector(`select[name="${item.id}"]`);
                const obs = document.getElementById('obs_' + item.id).value;
                if(sel && sel.value === 'NO') {
                    let peso = item.type === "PEC" ? "PEC" : item.weight + "%";
                    quiebres.push(`• ${item.label} (${peso}): ${obs || 'Sin observación'}`);
                }
            });
            if(quiebres.length > 0) textoFeedback += (textoFeedback ? "\n\n" : "") + "--- DETALLE ---\n" + quiebres.join('\n');
            
            const notaActual = document.getElementById('notaFinalHidden').value;

            // Confirmación inicial
            const confirm = await Swal.fire({
                title: '¿Registrar Auditoría?',
                html: `Se guardará la evaluación de <b>${document.getElementById('selectEjecutivo').value}</b> con nota final: <b class="text-xl text-blue-600">${notaActual}</b>.`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#3b82f6',
                confirmButtonText: 'Sí, enviar',
                cancelButtonText: 'Revisar'
            });

            if (!confirm.isConfirmed) return;

            document.getElementById('comentarioFinal').value = textoFeedback;
            document.getElementById('fechaAuditoria').value = new Date().toISOString().split('T')[0];
            const data = Object.fromEntries(new FormData(this));

            // MENSAJE DE CARGA PROCESANDO
            Swal.fire({
                title: 'Procesando...',
                html: 'Enviando datos al servidor, por favor espera.',
                allowOutsideClick: false,
                showConfirmButton: false,
                willOpen: () => {
                    Swal.showLoading();
                }
            });
            
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                
                // RESET UI
                this.reset(); 
                document.getElementById('comentarioFinal').value = "";
                document.getElementById('comentarioEjecutivo').classList.add('hidden');
                cerrarAudioFlotante();
                renderPauta(); 
                document.getElementById('totalScore').innerText = "100%";
                
                // MENSAJE DE ÉXITO REEMPLAZA AL DE CARGA
                Swal.fire({
                    icon: 'success',
                    title: '¡Éxito!',
                    text: 'La auditoría ha sido registrada correctamente.',
                    confirmButtonColor: '#3b82f6'
                });
            } catch (err) { 
                Swal.fire("Error", "Ocurrió un error de conexión al intentar guardar.", "error"); 
            }
        });

        // --- DASHBOARD (OPTIMIZADO Y CON TRAZABILIDAD) ---
        function borrarFiltros() {
            document.getElementById('filtroCiclo').value = ""; document.getElementById('filtroEjecutivo').value = ""; cargarDashboardEquipo();
        }

        async function actualizarDatosServidor() {
            const spinner = document.getElementById('loadSpinner');
            spinner.classList.remove('hidden');
            try {
                const r = await fetch(API_URL);
                const data = await r.json();
                FULL_DATA = data.auditorias || [];
                cargarDashboardEquipo();
            } catch (e) { 
                Swal.fire("Error", "No se pudo actualizar la base de datos.", "error");
            } finally { 
                spinner.classList.add('hidden'); 
            }
        }

        function cargarDashboardEquipo() {
            try {
                let filtrados = FULL_DATA.filter(d => d.SUPERVISOR === CURRENT_USER);

                const selectCiclo = document.getElementById('filtroCiclo');
                const cicloSeleccionado = selectCiclo.value;
                
                // Split con regex para guiones y barras
                const ciclosDisponibles = [...new Set(filtrados.map(d => {
                    const parts = String(d.FECHA_LLAMADA).split(/[-/]/);
                    if(parts.length < 2) return null;
                    const m = parseInt(parts[1]) - 1;
                    return `${mesesNombres[m]} - ${d.SEMANA}`;
                }).filter(Boolean))].sort();

                selectCiclo.innerHTML = '<option value="">Todos los Ciclos</option>';
                ciclosDisponibles.forEach(c => {
                    let opt = document.createElement('option'); opt.value = c; opt.innerText = c; selectCiclo.appendChild(opt);
                });
                if(cicloSeleccionado) selectCiclo.value = cicloSeleccionado;

                if(selectCiclo.value) {
                    filtrados = filtrados.filter(d => {
                        const parts = String(d.FECHA_LLAMADA).split(/[-/]/);
                        if(parts.length < 2) return false;
                        const m = parseInt(parts[1]) - 1;
                        return `${mesesNombres[m]} - ${d.SEMANA}` === selectCiclo.value;
                    });
                }

                const ejec = document.getElementById('filtroEjecutivo').value.toLowerCase();
                if(ejec) filtrados = filtrados.filter(d => (d.NOMBRE||"").toLowerCase().includes(ejec));

                const list = document.getElementById('listaEjecutivosFiltro');
                const nombresUnicos = [...new Set(filtrados.map(d => d.NOMBRE))];
                list.innerHTML = ""; nombresUnicos.forEach(n => { let opt = document.createElement('option'); opt.value = n; list.appendChild(opt); });

                const containerTarjetas = document.getElementById('containerTarjetas');
                containerTarjetas.innerHTML = "";
                nombresUnicos.forEach(nombre => {
                    const audsEjec = filtrados.filter(d => d.NOMBRE === nombre);
                    const prom = (audsEjec.reduce((a, b) => a + (parseInt(b.NOTA_FINAL) || 0), 0) / audsEjec.length).toFixed(0);
                    const count = audsEjec.length;
                    containerTarjetas.innerHTML += `
                        <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 text-center btn-press cursor-pointer" onclick="document.getElementById('filtroEjecutivo').value='${nombre}'; cargarDashboardEquipo();">
                            <p class="text-[9px] font-bold text-gray-400 uppercase truncate">${nombre}</p>
                            <p class="text-xl font-black text-blue-600">${prom}%</p>
                            <p class="text-2xl font-black ${count === 0 ? 'text-red-600 animate-pulse' : 'text-slate-700'}">${count}</p>
                            <p class="text-[9px] text-gray-400 uppercase">Auditorías</p>
                        </div>`;
                });

                const notas = filtrados.map(d => parseInt(d.NOTA_FINAL) || 0);
                document.getElementById('dashProm').innerText = (notas.length ? (notas.reduce((a,b)=>a+b,0)/notas.length).toFixed(0) : 0) + "%";
                document.getElementById('dashPec').innerText = notas.filter(n => n === 0).length;
                document.getElementById('kpiFeedbackCount').innerText = `${filtrados.filter(d => d.FEEDBACK_STATUS === "REALIZADO").length}/${filtrados.length}`;

                const tb = document.getElementById('tablaEquipo'); tb.innerHTML = "";
                filtrados.forEach((d) => {
                    const isDone = d.FEEDBACK_STATUS === "REALIZADO";
                    const isCrossAudit = d.AUDITOR_REAL && d.AUDITOR_REAL !== d.SUPERVISOR;
                    const badgeClass = isCrossAudit ? 'bg-orange-100 text-orange-700 font-bold' : 'bg-gray-100 text-gray-500';
                    const auditorName = d.AUDITOR_REAL || 'Desconocido';

                    const row = document.createElement('tr');
                    row.className = "hover:bg-blue-50 transition cursor-pointer";
                    row.onclick = () => verDetalleAuditoria(d);
                    row.innerHTML = `
                        <td class="p-3 font-medium">
                            <span class="block">${d.NOMBRE}</span>
                            <span class="${badgeClass} text-[9px] px-1 rounded block w-max mt-1">Auditado por: ${auditorName}</span>
                        </td>
                        <td class="p-3 text-center align-middle">${d.FECHA_LLAMADA}</td>
                        <td class="p-3 text-center align-middle font-bold ${parseInt(d.NOTA_FINAL) < 85 ? 'text-red-500':'text-green-600'}">${d.NOTA_FINAL}</td>
                        <td class="p-3 text-center align-middle"><span class="px-2 py-0.5 rounded-full text-[9px] font-bold ${isDone ? 'bg-green-100 text-green-700':'bg-amber-100 text-amber-700'}">${d.FEEDBACK_STATUS}</span></td>
                        <td class="p-3 text-center align-middle" onclick="event.stopPropagation();">
                            ${!isDone ? `<button onclick="abrirFeedback('${d.CODIGO}', '${d.FECHA_AUDITORIA}')" class="bg-blue-600 text-white px-3 py-1 rounded-lg hover:bg-blue-700 btn-press">Feedback</button>` : '✅'}
                        </td>`;
                    tb.appendChild(row);
                });
            } catch (e) { console.error(e); }
        }

        function verDetalleAuditoria(data) {
            let pautaDetalle = "";
            if(data.DETALLE) {
                pautaDetalle = `<div class="mt-4 p-3 bg-red-50 rounded text-left text-xs border border-red-100"><p class="font-bold text-red-700 mb-2">INDICADORES NO CUMPLIDOS:</p>`;
                let count = 0;
                for (const [key, val] of Object.entries(data.DETALLE)) {
                    if(val === "NO") {
                        const item = pautaItems.find(p => p.id === key.toLowerCase() || p.id === "item_" + key.toLowerCase().split('_')[1]);
                        pautaDetalle += `<p class="mb-1">❌ <b>${item ? item.label : key}:</b> Marcado como NO.</p>`;
                        count++;
                    }
                }
                if(count === 0) pautaDetalle = `<div class="mt-4 p-3 bg-green-50 rounded text-left text-xs border border-green-100"><p class="font-bold text-green-700">Cumplimiento total de indicadores.</p>`;
                pautaDetalle += `</div>`;
            }

            const audioHtml = data.AUDIO_URL && data.AUDIO_URL.trim() !== "" ? 
                `<div class="mt-4 bg-slate-100 p-3 rounded border border-gray-200">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Escuchar Grabación:</p>
                    <audio controls class="w-full h-8"><source src="${data.AUDIO_URL}" type="audio/mpeg">Tu navegador no soporta el audio.</audio>
                </div>` : 
                `<div class="mt-4 bg-amber-50 p-3 rounded border border-amber-200 text-amber-700 text-xs italic">La URL del audio no está disponible para esta auditoría.</div>`;

            Swal.fire({
                title: `<span class="text-blue-600">${data.NOMBRE}</span>`,
                html: `
                    <div class="text-sm border-t pt-4">
                        <div class="grid grid-cols-2 gap-2 text-left mb-4">
                            <div><p class="text-[9px] font-bold text-gray-400 uppercase">RUT Paciente</p>
                                <div class="flex items-center gap-2"><span class="font-bold">${data.RUT_PACIENTE || 'N/A'}</span><button onclick="navigator.clipboard.writeText('${data.RUT_PACIENTE}')" class="text-blue-500 text-xs"><i class="fas fa-copy"></i></button></div>
                            </div>
                            <div><p class="text-[9px] font-bold text-gray-400 uppercase">Nota Final</p><p class="text-xl font-black text-blue-600">${data.NOTA_FINAL}</p></div>
                            <div><p class="text-[9px] font-bold text-gray-400 uppercase">Fecha Llamada</p><p class="font-bold">${data.FECHA_LLAMADA}</p></div>
                            <div><p class="text-[9px] font-bold text-gray-400 uppercase">Hora</p><p class="font-bold">${data.HORA_LLAMADA}</p></div>
                        </div>
                        <div class="bg-gray-50 p-3 rounded text-left text-xs border italic"><p class="font-bold text-gray-500 not-italic uppercase mb-1">Comentario General:</p>${data.COMENTARIO || 'Sin comentarios.'}</div>
                        ${pautaDetalle}
                        ${audioHtml}
                    </div>
                `,
                showCloseButton: true, confirmButtonText: 'Cerrar', width: '500px'
            });
        }

        function sortTable(n) {
            const table = document.getElementById("tableMain");
            let switching = true, shouldSwitch, i, x, y, dir = "asc", switchcount = 0;
            while (switching) {
                switching = false; const rows = table.rows;
                for (i = 1; i < (rows.length - 1); i++) {
                    shouldSwitch = false;
                    x = rows[i].getElementsByTagName("TD")[n]; y = rows[i + 1].getElementsByTagName("TD")[n];
                    if (dir == "asc") { if (x.innerHTML.toLowerCase() > y.innerHTML.toLowerCase()) { shouldSwitch = true; break; } } 
                    else if (dir == "desc") { if (x.innerHTML.toLowerCase() < y.innerHTML.toLowerCase()) { shouldSwitch = true; break; } }
                }
                if (shouldSwitch) { rows[i].parentNode.insertBefore(rows[i + 1], rows[i]); switching = true; switchcount ++; } 
                else { if (switchcount == 0 && dir == "asc") { dir = "desc"; switching = true; } }
            }
        }

        async function abrirFeedback(cod, fecha) {
            const { value: texto } = await Swal.fire({ title: 'Cerrar Ciclo', input: 'textarea', inputLabel: 'Compromisos...', showCancelButton: true });
            if (texto) {
                const payload = { action: "REGISTER_FEEDBACK", codigo: cod, fecha_auditoria: fecha, feedback_detalle: texto };
                try { await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) }); Swal.fire("Éxito", "Feedback guardado", "success"); actualizarDatosServidor(); } catch (e) { Swal.fire("Error", "No se pudo guardar", "error"); }
            }
        }

        // --- LÓGICA DEL REPRODUCTOR PIP FLOTANTE ---
        const audioEl = document.getElementById('audioFlotante');
        const pipPlayer = document.getElementById('pipPlayer');
        const playBtn = document.getElementById('btnPlay');
        const seekSlider = document.getElementById('seekSlider');
        let isDragging = false, startX, startY, initialX, initialY;

        function cargarAudioFlotante() {
            const url = document.getElementById('inputAudioUrl').value;
            if(!url) return Swal.fire('Aviso', 'Ingresa una URL de audio válida en el campo primero.', 'info');
            audioEl.src = url;
            pipPlayer.classList.remove('hidden');
            audioEl.play().catch(e => console.log('Autoplay prevenido por navegador'));
            playBtn.innerHTML = '<i class="fas fa-pause text-xs"></i>';
        }
        function cerrarAudioFlotante() { stopAudio(); pipPlayer.classList.add('hidden'); }
        function togglePlay() {
            if(audioEl.paused) { audioEl.play(); playBtn.innerHTML = '<i class="fas fa-pause text-xs"></i>'; }
            else { audioEl.pause(); playBtn.innerHTML = '<i class="fas fa-play text-xs"></i>'; }
        }
        function stopAudio() { audioEl.pause(); audioEl.currentTime = 0; playBtn.innerHTML = '<i class="fas fa-play text-xs"></i>'; }
        function changeSpeed(v) { audioEl.playbackRate = parseFloat(v); }

        audioEl.addEventListener('timeupdate', () => {
            seekSlider.value = Math.floor(audioEl.currentTime);
            document.getElementById('timeCurrent').innerText = formatTime(audioEl.currentTime);
            if(!isNaN(audioEl.duration)) {
                seekSlider.max = Math.floor(audioEl.duration);
                document.getElementById('timeTotal').innerText = formatTime(audioEl.duration);
            }
        });
        seekSlider.addEventListener('input', () => { audioEl.currentTime = seekSlider.value; });
        function formatTime(sec) { const m = Math.floor(sec / 60); const s = Math.floor(sec % 60); return `${m}:${s < 10 ? '0':''}${s}`; }

        const dragHandle = document.querySelector('.drag-handle');
        dragHandle.addEventListener('mousedown', e => {
            isDragging = true; startX = e.clientX; startY = e.clientY;
            const rect = pipPlayer.getBoundingClientRect();
            initialX = rect.left; initialY = rect.top;
            pipPlayer.style.right = 'auto'; pipPlayer.style.bottom = 'auto'; 
        });
        document.addEventListener('mousemove', e => {
            if(!isDragging) return;
            pipPlayer.style.left = (initialX + e.clientX - startX) + 'px';
            pipPlayer.style.top = (initialY + e.clientY - startY) + 'px';
        });
        document.addEventListener('mouseup', () => isDragging = false);

    </script>
</body>
